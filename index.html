<!DOCTYPE html>
<html>
  <head>
    <title>Sinisinta</title>
    <style>
      body { font-family: Georgia, serif; margin: 0; background: #fafafa; }

      header { background-image: linear-gradient (45deg black,white); color: black padding: 30px; text-align: center; }

      nav { display: flex; gap: 20px; padding: 10px 30px; background: #f0ede8; border-bottom: 0px solid #ccc; justify-content: center; margin: 12px; }
      nav a { text-decoration: none; color: #333; }
      
      .cards-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 1.25rem;
        padding: 10px 2rem 2rem;
        max-width: 1100px;
        margin: 0 auto;
      }

      .card { background: white; border: 1px solid #ddd; border-radius: 8px; padding: 20px; }
    </style>
  </head>
  <body>

    <header>
      <h1>Mga Liham</h1>
    </header>

    <nav>
      <a href="#">mga salitang pilit ikinubli ngunit damdamin pa rin ang nagwagi</a>
    </nav>

    <div class="cards-grid">

      <div class="card">
        <h2>Unang Liham</h2>
        <p>kumusta?</p>
      </div>

      <div class="card">
        <h2>Ikalawang Liham</h2>
        <p>nandito pa rin ako.</p>
      </div>

      <div class="card">
        <h2>Ikatlong Liham</h2>
        <p>sana okay ka na.</p>
      </div>

    </div>

  </body>
</html>
